<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sweetRaspberry | Эксклюзив на Fansly</title>
  <meta name="description" content="Эксклюзивный контент от sweetRaspberry: фото, видео и знимательные откровеные истории из жизни людей. 💕">
  
  <!-- 🔧 НАСТРОЙКИ ЦВЕТОВ (меняйте здесь!) -->
  <style>
    :root {
      /* 🎨 Градиент фона */
      --bg-gradient: linear-gradient(135deg, #66CDAA 5%, #20B2AA 50%, #008B8B 100%);
      
      /* 🎨 Цвета карточки */
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-shadow: 0 25px 80px rgba(240, 147, 251, 0.5);
      
      /* 🎨 Текст */
      --text-primary: #2d3748;
      --text-secondary: #718096;
      --text-accent: #667eea;
      
      /* 🎨 Кнопки */
      --btn-gradient: linear-gradient(135deg, #667eea 0%, #DC143C 100%);
      --btn-hover: linear-gradient(135deg, #5568d3 0%, #CD5C5C 100%);
      --btn-shadow: 0 12px 35px rgba(102, 126, 234, 0.45);
      
      /* 🎨 Соцсети */
      --telegram-color: #0088cc;
      --instagram-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      
      /* 🎨 Анимации */
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s ease;
      --transition-slow: 0.5s ease;
    }

    /* 🔧 ШРИФТЫ (подключите свои, если нужно) */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', 'Segoe UI', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-attachment: fixed;
      animation: gradientShift 15s ease infinite;
    }

    /* 🌈 Анимация фона */
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 45px 35px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(12px);
      animation: cardEntrance 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(240,147,251,0.1) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    /* 👤 Аватар */
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: var(--btn-gradient);
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      color: white;
      border: 5px solid white;
      box-shadow: 0 12px 40px rgba(240, 147, 251, 0.5);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    .avatar:hover {
      transform: scale(1.08) rotate(3deg);
      box-shadow: 0 18px 55px rgba(240, 147, 251, 0.7);
    }

    /* ✨ Имя и описание */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      transition: color var(--transition-fast);
    }

    .card:hover .name {
      color: var(--text-accent);
    }

    .handle {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .bio {
      color: var(--text-primary);
      line-height: 1.7;
      margin-bottom: 32px;
      font-size: 15px;
      opacity: 0.95;
    }

    /* 🔗 Основная кнопка */
    .btn-main {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--btn-gradient);
      color: white;
      text-decoration: none;
      padding: 18px 36px;
      border-radius: 55px;
      font-weight: 700;
      font-size: 16px;
      transition: all var(--transition-normal);
      box-shadow: var(--btn-shadow);
      width: 100%;
      max-width: 320px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .btn-main::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-main:hover::before {
      left: 100%;
    }

    .btn-main:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 50px rgba(102, 126, 234, 0.65);
      background: var(--btn-hover);
    }

    .btn-main:active {
      transform: translateY(-1px) scale(1.01);
    }

    /* 📱 Кнопки соцсетей */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 35px 0 20px;
      flex-wrap: wrap;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      text-decoration: none;
      transition: all var(--transition-normal);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
    }

    .social-btn svg {
      width: 26px;
      height: 26px;
      fill: white;
      transition: transform var(--transition-fast);
      z-index: 2;
    }

    .social-btn:hover {
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .social-btn:hover svg {
      transform: scale(1.15);
    }

    .social-btn.telegram {
      background: var(--telegram-color);
    }

    .social-btn.instagram {
      background: var(--instagram-gradient);
    }

    .social-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.2);
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .social-btn:hover::after {
      opacity: 1;
    }

    /* 🏷️ Платформа */
    .platform {
      margin-top: 28px;
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .platform svg {
      width: 18px;
      height: 18px;
      fill: var(--text-secondary);
    }

    /* ✨ Декоративные элементы */
    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* 🦶 Футер */
    .footer {
      margin-top: 35px;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.8;
    }

    /* 📱 Адаптивность */
    @media (max-width: 480px) {
      .card { padding: 35px 25px; }
      .name { font-size: 26px; }
      .avatar { width: 110px; height: 110px; font-size: 44px; }
      .btn-main { padding: 16px 30px; font-size: 15px; }
      .social-btn { width: 48px; height: 48px; }
    }

    /* 🎯 Эффект при клике */
    .click-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      transform: scale(0);
      animation: ripple 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
  </style>
</head>

  <!-- ✨ Скрипт для микро-анимаций -->
  <script>
    // Эффект ряби при клике на кнопки
    function createRipple(event, element) {
      const ripple = document.createElement('span');
      ripple.classList.add('click-ripple');
      
      const rect = element.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      
      element.appendChild(ripple);
      
      setTimeout(() => ripple.remove(), 600);
    }

    // Добавляем обработчики
    document.querySelectorAll('.btn-main, .social-btn').forEach(btn => {
      btn.addEventListener('click', (e) => createRipple(e, btn));
    });

    // Параллакс-эффект для карточки при движении мыши
    const card = document.getElementById('mainCard');
    document.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Сброс трансформации при уходе мыши
    document.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateY(0deg) rotateX(0deg)';
    });

    // Плавное появление элементов при загрузке
    document.addEventListener('DOMContentLoaded', () => {
      const elements = document.querySelectorAll('.name, .handle, .bio, .btn-main, .social-links');
      elements.forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(15px)';
        el.style.transition = `opacity 0.4s ease, transform 0.4s ease ${i * 0.1}s`;
        
        setTimeout(() => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        }, 300);
      });
    });
  </script>
